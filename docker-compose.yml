version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task_tracker_postgres
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: task_tracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d task_tracker_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_tracker_network

  redis:
    image: redis:7-alpine
    container_name: task_tracker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - task_tracker_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_tracker_app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://taskuser:taskpassword@postgres:5432/task_tracker_db
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: super-secret-jwt-key-for-development-change-in-production-12345
      JWT_REFRESH_SECRET: super-secret-refresh-key-for-development-change-in-production-12345
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - task_tracker_network

volumes:
  postgres_data:
  redis_data:

networks:
  task_tracker_network:
    driver: bridge
